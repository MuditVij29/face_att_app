<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Powered Attendance</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Required Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.min.js"></script>
    <script defer src="script.js"></script>

    <style>
        :root {
            --primary-color: #4f46e5;
            --primary-hover: #4338ca;
            --secondary-color: #10b981;
            --secondary-hover: #059669;
            --bg-color: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.8);
            --text-main: #f8fafc;
            --text-muted: #cbd5e1;
            --border-color: rgba(148, 163, 184, 0.2);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background: linear-gradient(135deg, var(--bg-color), #1e1b4b);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem;
            position: relative;
            overflow-x: hidden;
        }

        /* Abstract Background Elements */
        body::before {
            content: '';
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(79, 70, 229, 0.3) 0%, transparent 70%);
            top: -100px;
            left: -100px;
            border-radius: 50%;
            z-index: 0;
            pointer-events: none;
        }

        body::after {
            content: '';
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(16, 185, 129, 0.2) 0%, transparent 70%);
            bottom: -50px;
            right: -50px;
            border-radius: 50%;
            z-index: 0;
            pointer-events: none;
        }

        .container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 1200px;
            display: grid;
            grid-template-columns: 1fr 1.5fr;
            gap: 2rem;
            align-items: start;
        }

        header {
            width: 100%;
            text-align: center;
            margin-bottom: 2.5rem;
            z-index: 10;
        }

        .institute-name {
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--secondary-color);
            margin-bottom: 0.5rem;
            font-weight: 600;
        }

        h1 {
            font-size: 3rem;
            font-weight: 700;
            background: linear-gradient(to right, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        .subtitle {
            font-size: 1.1rem;
            color: var(--text-muted);
            font-weight: 300;
        }

        .glass-panel {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .controls {
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
        }

        h2 {
            font-size: 1.5rem;
            margin-bottom: 1rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        h2::before {
            content: '';
            display: inline-block;
            width: 8px;
            height: 24px;
            background: var(--primary-color);
            border-radius: 4px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        label {
            font-size: 0.9rem;
            color: var(--text-muted);
            font-weight: 400;
        }

        input {
            width: 100%;
            padding: 0.8rem 1rem;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(148, 163, 184, 0.3);
            border-radius: 10px;
            color: white;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.2);
        }

        input[type="date"]::-webkit-calendar-picker-indicator {
            filter: invert(1);
            cursor: pointer;
        }

        .btn {
            padding: 1rem 1.5rem;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0.5rem;
            margin-top: 1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary-color), #6366f1);
            color: white;
            box-shadow: 0 4px 15px rgba(79, 70, 229, 0.4);
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(79, 70, 229, 0.6);
            background: linear-gradient(135deg, var(--primary-hover), #4f46e5);
        }

        .btn-success {
            background: linear-gradient(135deg, var(--secondary-color), #34d399);
            color: white;
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.4);
        }

        .btn-success:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(16, 185, 129, 0.6);
            background: linear-gradient(135deg, var(--secondary-hover), #10b981);
        }

        .btn:disabled {
            background: #475569;
            color: #94a3b8;
            cursor: not-allowed;
            box-shadow: none;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            padding: 0.5rem 1rem;
            background: rgba(245, 158, 11, 0.1);
            border: 1px solid rgba(245, 158, 11, 0.3);
            color: #fbbf24;
            border-radius: 30px;
            font-size: 0.9rem;
            font-weight: 600;
            margin-top: 1rem;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% {
                opacity: 0.8;
            }

            50% {
                opacity: 1;
            }

            100% {
                opacity: 0.8;
            }
        }

        .status-ready {
            background: rgba(16, 185, 129, 0.1);
            border-color: rgba(16, 185, 129, 0.3);
            color: #10b981;
            animation: none;
        }

        .status-active {
            background: rgba(56, 185, 248, 0.1);
            border-color: rgba(56, 185, 248, 0.3);
            color: #38bdf8;
            animation: none;
        }

        .status-error {
            background: rgba(239, 68, 68, 0.1);
            border-color: rgba(239, 68, 68, 0.3);
            color: #ef4444;
            animation: none;
        }

        .video-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        #video-container {
            position: relative;
            width: 100%;
            aspect-ratio: 4/3;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 0 0 4px rgba(255, 255, 255, 0.05), 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 12px;
            transform: scaleX(-1);
            /* Mirror effect */
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 20;
            pointer-events: none;
        }

        .scan-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, transparent, rgba(56, 185, 248, 0.2) 50%, transparent);
            background-size: 100% 200%;
            animation: scan 3s linear infinite;
            z-index: 10;
            display: none;
            pointer-events: none;
        }

        @keyframes scan {
            0% {
                background-position: 0 -100%;
            }

            100% {
                background-position: 0 100%;
            }
        }

        .recent-attendance {
            margin-top: 1.5rem;
            max-height: 200px;
            overflow-y: auto;
            border-radius: 8px;
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid var(--border-color);
        }

        .recent-attendance::-webkit-scrollbar {
            width: 6px;
        }

        .recent-attendance::-webkit-scrollbar-thumb {
            background: rgba(148, 163, 184, 0.4);
            border-radius: 10px;
        }

        .attendance-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.8rem 1rem;
            border-bottom: 1px solid var(--border-color);
        }

        .attendance-item:last-child {
            border-bottom: none;
        }

        .att-name {
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .att-name::before {
            content: '';
            width: 8px;
            height: 8px;
            background: var(--secondary-color);
            border-radius: 50%;
            display: inline-block;
            box-shadow: 0 0 8px var(--secondary-color);
        }

        .att-time {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        /* Responsive */
        @media (max-width: 900px) {
            h1 {
                font-size: 2.2rem;
            }

            .container {
                grid-template-columns: 1fr;
            }

            .video-section {
                order: -1;
            }
        }
    </style>
</head>

<body>

    <header>
        <div class="institute-name">Dayalbagh Educational Institute, Agra</div>
        <h1>AI Attendance Manager</h1>
        <div class="subtitle">Next-Generation Face Recognition Technology</div>
    </header>

    <div class="container">

        <div class="glass-panel controls">
            <h2>Session Details</h2>

            <div class="input-group">
                <label for="className">Class / Subject Code</label>
                <input type="text" id="className" placeholder="e.g., CS_101_SecA" required>
            </div>

            <div class="input-group">
                <label for="classDate">Date</label>
                <input type="date" id="classDate" required>
            </div>

            <button id="startBtn" class="btn btn-primary" disabled>
                Initializing AI... ⏳
            </button>

            <button id="exportBtn" class="btn btn-success" style="display: none;">
                <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                    xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path>
                </svg>
                End & Download Report
            </button>

            <div id="status" class="status-badge">Loading neural networks...</div>

            <div style="margin-top: 1.5rem;">
                <h3 style="font-size: 1rem; color: var(--text-muted); margin-bottom: 0.5rem;">Recent Scans</h3>
                <div class="recent-attendance" id="recentList">
                    <!-- Logs will appear here dynamically -->
                    <div
                        style="padding: 1rem; text-align: center; color: rgba(148,163,184,0.5); font-style: italic; font-size: 0.9rem;">
                        No entries yet</div>
                </div>
            </div>
        </div>

        <div class="glass-panel video-section">
            <div id="video-container">
                <video id="video" autoplay muted playsinline></video>
                <div class="scan-overlay" id="scanOverlay"></div>
            </div>
            <div
                style="margin-top: 1rem; text-align: center; color: var(--text-muted); font-size: 0.9rem; clear: both;">
                Camera detects faces automatically and matches against the database.
            </div>
        </div>

    </div>

    <!-- Set default date to today -->
    <script>
        document.getElementById('classDate').valueAsDate = new Date();
    </script>
</body>

</html>
